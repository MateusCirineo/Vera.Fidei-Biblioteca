services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: vera_fidei
      POSTGRES_USER: vera
      POSTGRES_PASSWORD: vera123
    volumes:
      - postgres_data:/var/lib/postgresql/data

  elasticsearch:
    image: elasticsearch:8.13.0
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    volumes:
      - ./backend/chroma_db:/app/chroma_db
      - ./backend/pdfs:/app/pdfs
    depends_on:
      - postgres
      - elasticsearch
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "X-API-Key: UmGKwx6a-aGLzA-_PsakG-u7lSbB1qhlmgD7eUWUWRc", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://verafidei.oialfred.com/api
        NEXT_PUBLIC_API_KEY: UmGKwx6a-aGLzA-_PsakG-u7lSbB1qhlmgD7eUWUWRc
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/pdfs:/app/pdfs:ro
    networks:
      - default
      - npm_network
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  es_data:

networks:
  default:
  npm_network:
    external: true
    name: nginx-proxy-manager_default
