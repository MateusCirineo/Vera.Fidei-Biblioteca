<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#111111" />
    <title>Vera.Fidei offline</title>
    <style>
      :root {
        color-scheme: dark;
        background: #111111;
        color: #f5f0e8;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #111111;
      }

      main {
        width: min(460px, 100%);
        border: 1px solid rgba(201, 168, 76, 0.28);
        border-radius: 8px;
        background: #1a1a1a;
        padding: 28px;
      }

      img {
        display: block;
        width: 92px;
        height: auto;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0 0 10px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 28px;
        line-height: 1.1;
      }

      p {
        margin: 0;
        color: #b8b0a0;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/branding/Logo-VF.png" alt="Vera.Fidei" />
      <h1>Vera.Fidei</h1>
      <p>
        Voce esta offline. As paginas ja visitadas podem continuar disponiveis; para
        consultar PDFs, verificar citacoes e carregar novos conteudos, reconecte-se.
      </p>
    </main>
  </body>
</html>
